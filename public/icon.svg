<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#013c4a"/>

  <!-- Outer soft glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c8a96e" stroke-width="3" opacity="0.4"/>

  <!-- Left figure -->
  <circle cx="192" cy="178" r="28" fill="#c8a96e" opacity="0.9"/>
  <path d="M160 310 Q192 260 224 310" fill="#c8a96e" opacity="0.9"/>

  <!-- Right figure -->
  <circle cx="320" cy="178" r="28" fill="#c8a96e" opacity="0.9"/>
  <path d="M288 310 Q320 260 352 310" fill="#c8a96e" opacity="0.9"/>

  <!-- Connection arc between figures -->
  <path d="M220 200 Q256 150 292 200" fill="none" stroke="#c8a96e" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <!-- Center heart / spark -->
  <circle cx="256" cy="256" r="12" fill="#c8a96e" opacity="0.95"/>
  <circle cx="256" cy="256" r="22" fill="none" stroke="#c8a96e" stroke-width="2" opacity="0.4"/>

  <!-- Connecting lines from figures to center -->
  <line x1="208" y1="290" x2="244" y2="256" stroke="#c8a96e" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="304" y1="290" x2="268" y2="256" stroke="#c8a96e" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
